<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical App UI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #fff;
        }

        /* SECTION */
        .medx-section-root {
            padding: 80px 0;
        }

        .medx-container-wrap {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        /* LAYOUT */
        .medx-grid-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            align-items: center;
        }

        /* LEFT SIDE */
        .medx-phone-bg {
            background: #f3f6fb;
            border-radius: 28px;
            padding: 20px 20px 0px 20px;
            display: flex;
            justify-content: center;
        }

        .medx-phone-holder {
            position: relative;
            width: 340px;
        }

        .medx-phone-image {
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* SLIDER */
        .medx-slider-shell {
            position: absolute;
            top: 170px;
            left: 50%;
            transform: translateX(-50%);
            width: 598px;
            overflow: hidden;
            z-index: 3;
        }

        .medx-slider-track {
            display: flex;
            gap: 16px;
            will-change: transform;
        }

        .medx-slide-card {
            min-width: 150px;
            border-radius: 16px;
        }

        .medx-slide-card img {
            width: 100%;
            border-radius: 12px;
        }

        /* RIGHT SIDE */
        .medx-content-column {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* HERO CARD */
        .medx-hero-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }

        .medx-hero-image {
            width: 100%;
            object-fit: cover;
        }

        .medx-hero-icon {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .medx-hero-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
        }

        /* FEATURES */
        .medx-feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .medx-feature-box {
            background: #fff;
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .medx-feature-icon {
            width: 42px;
            height: 42px;
            background: #f3f6fb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .medx-feature-title {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .medx-feature-desc {
            font-size: 14px;
            color: #6b7280;
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            .medx-grid-layout {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .medx-feature-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .medx-phone-holder {
                width: 280px;
            }

            .medx-slider-shell {
                width: 360px;
            }
        }
    </style>
</head>

<body>

    <section class="medx-section-root">
        <div class="medx-container-wrap">
            <div class="medx-grid-layout">

                <!-- LEFT -->
                <div class="medx-phone-bg">
                    <div class="medx-phone-holder">
                        <img src="assets/image/mobileapp/capture11.png" class="medx-phone-image">

                        <div class="medx-slider-shell">
                            <div class="medx-slider-track" id="medxSliderTrack">
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture2.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture3.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture4.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture5.webp"></div>

                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture2.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture3.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture4.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture5.webp"></div>

                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture2.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture3.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture4.webp"></div>
                                <div class="medx-slide-card"><img src="assets/image/mobileapp/capture5.webp"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT -->
                <div class="medx-content-column">

                    <div class="medx-hero-wrapper">
                        <!-- <div class="medx-hero-icon">🔒</div> -->
                        <img src="assets/image/sf.jpg" class="medx-hero-image">
                        <p class="medx-hero-text">
                            With our app, you can get expert medical advice right at your fingertips.
                        </p>
                    </div>

                    <div class="medx-feature-grid">
                        <div class="medx-feature-box">
                            <div class="medx-feature-icon">⏱</div>
                            <h4 class="medx-feature-title">Instant Consultations</h4>
                            <p class="medx-feature-desc">Say goodbye to long waits at the doctor's office.</p>
                        </div>

                        <div class="medx-feature-box">
                            <div class="medx-feature-icon">❤️</div>
                            <h4 class="medx-feature-title">Health Journey</h4>
                            <p class="medx-feature-desc">Track and manage your health anytime.</p>
                        </div>

                        <div class="medx-feature-box">
                            <div class="medx-feature-icon">👨‍⚕️</div>
                            <h4 class="medx-feature-title">Trusted Experts</h4>
                            <p class="medx-feature-desc">Consult verified doctors globally.</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <script>
        const medxTrack = document.getElementById("medxSliderTrack");
        const medxCards = medxTrack.children;
        const medxGap = 16;
        const medxCardWidth = medxCards[0].offsetWidth + medxGap;

        let medxPosition = medxCards.length / 3;
        medxTrack.style.transform = `translateX(-${medxPosition * medxCardWidth}px)`;

        function medxAnimateSlider() {
            medxPosition += 0.005;
            if (medxPosition >= (medxCards.length * 2) / 3) {
                medxPosition = medxCards.length / 3;
            }
            medxTrack.style.transform = `translateX(-${medxPosition * medxCardWidth}px)`;
            requestAnimationFrame(medxAnimateSlider);
        }

        medxAnimateSlider();
    </script>

</body>

</html>
